name: Mizu

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  pull-requests: write
  contents: read

jobs:
  # Tự động comment khi có PR mới
  welcome-pr:
    name: Mizu Greet Your PR :>
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Gửi lời chào từ Bot
        uses: actions/github-script@v7
        with:
          script: |
            const msg = `👋 Chào đằng ấy! **Mizu (Bot)** đã nhận được Pull Request rồi nha.\n\nCứ cắm tai nghe bật nhạc chill đi, mình đang lôi code ra "soi" rồi. Chờ mình lấy dấu tick xanh về cho nhé! (⌐■_■)✨`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: msg
            })

  # Kiểm tra chuẩn Commit Message
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Commit Message Convention
        uses: wagoid/commitlint-github-action@v5

  # Biên dịch và Test
  build-and-check:
    needs: lint-commits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Build project with Gradle
        run: ./gradlew build -x test