name: Bot Quét Lỗi Của Yuri

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy mã nguồn từ repo về máy ảo của GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java (JDK 21) để biên dịch
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. Cấp quyền chạy file script gradle cho máy ảo Linux
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Chạy con bot tự động kiểm tra chất lượng code Kotlin
      - name: Run Detekt Static Code Analysis
        run: ./gradlew detekt
        continue-on-error: true # Nếu code chưa chuẩn style thì vẫn chạy tiếp bước build ở dưới

      # 5. Biên dịch thử dự án
      - name: Build project with Gradle
        run: ./gradlew build -x test