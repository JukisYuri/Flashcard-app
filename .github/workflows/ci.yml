name: Bot Quét Lỗi Của Yuri

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # Kiểm tra chuẩn Commit Message
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Commit Message Convention
        uses: wagoid/commitlint-github-action@v5

  # Biên dịch và Test
  build-and-check:
    needs: lint-commits
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy mã nguồn từ repo về máy ảo của GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java (JDK 21) để biên dịch
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. Cấp quyền chạy file script gradle cho máy ảo Linux
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Build project with Gradle
        run: ./gradlew build -x test